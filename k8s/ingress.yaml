# Requires an ingress controller (e.g. ingress-nginx).
# Routes /api/* to the API, everything else to the web app.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vetjobs
  namespace: vetjobs
spec:
  rules:
    - host: vetjobs.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
