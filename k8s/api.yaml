apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: vetjobs
type: Opaque
stringData:
  DATABASE_URL: postgres://vetjobs:vetjobs@postgres:5432/vetjobs
  JWT_SECRET: change-me-to-a-long-random-string
  CORS_ORIGIN: "*"
  # Optional free AI cover letters (Groq):
  LLM_API_KEY: ""
  LLM_BASE_URL: https://api.groq.com/openai/v1
  LLM_MODEL: llama-3.3-70b-versatile
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: vetjobs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: vetjobs-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: api-secret
          env:
            - name: PORT
              value: "4000"
          ports:
            - containerPort: 4000
          readinessProbe:
            httpGet:
              path: /api/jobs
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: vetjobs
spec:
  selector:
    app: api
  ports:
    - port: 4000
      targetPort: 4000
