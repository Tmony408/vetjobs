apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: vetjobs
type: Opaque
stringData:
  POSTGRES_USER: vetjobs
  POSTGRES_PASSWORD: vetjobs
  POSTGRES_DB: vetjobs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: vetjobs
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: vetjobs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          envFrom:
            - secretRef:
                name: postgres-secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: vetjobs
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
