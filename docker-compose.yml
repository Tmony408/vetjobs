# Full local stack: Postgres + API + Web.  Run:  docker compose up --build
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vetjobs
      POSTGRES_PASSWORD: vetjobs
      POSTGRES_DB: vetjobs
    ports:
      - "5432:5432"
    volumes:
      - vetjobs_pgdata:/var/lib/postgresql/data

  api:
    build: ./vetjobs-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://vetjobs:vetjobs@db:5432/vetjobs
      JWT_SECRET: dev-secret-change-me
      CORS_ORIGIN: http://localhost:3000
      PORT: "4000"
      # Optional free AI cover letters (Groq):
      LLM_API_KEY: ""
      LLM_BASE_URL: https://api.groq.com/openai/v1
      LLM_MODEL: llama-3.3-70b-versatile
    ports:
      - "4000:4000"
    depends_on:
      - db

  web:
    build: ./vetjobs-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  vetjobs_pgdata:
